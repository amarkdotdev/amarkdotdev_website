name: CI-CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests (if present)
        run: npm run test --if-present

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Deploy to Lightsail
        env:
          DEPLOY_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Upload built files to a temp location on the server
          rsync -az --delete \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            out/ \
            ubuntu@99.80.30.152:/tmp/amark-deploy/

          # Atomically swap into the web root
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@99.80.30.152 \
            "sudo rsync -a --delete /tmp/amark-deploy/ /var/www/amark.dev/ && \
             sudo chown -R www-data:www-data /var/www/amark.dev/ && \
             rm -rf /tmp/amark-deploy"

          rm /tmp/deploy_key
